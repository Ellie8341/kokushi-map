<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>進捗マップ</title>

<meta name="apple-mobile-web-app-title" content="進捗マップ">

<link rel="apple-touch-icon" sizes="180x180" href="https://ellie8341.github.io/kokushi-map/icon-180-v2.png">
<link rel="apple-touch-icon" sizes="152x152" href="https://ellie8341.github.io/kokushi-map/icon-152-v2.png">
<link rel="apple-touch-icon" sizes="120x120" href="https://ellie8341.github.io/kokushi-map/icon-120-v2.png">

<style>
body { font-family: sans-serif; margin: 0; padding: 10px; background-color: #f5f5f5; }
h1 { text-align: center; }
.tabs, .genre-tabs { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 10px; }
.tab, .genre-tab { padding: 8px 12px; background: white; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; white-space: nowrap; }
.tab.active, .genre-tab.active { background-color: #4CAF50; color: white; }
#grid-container { width: 100%; }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.cell { aspect-ratio: 1/1; min-width: 50px; font-size: 16px; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid #ccc; border-radius: 4px; user-select: none; }
.star-btn { position: absolute; bottom: 2px; right: 2px; font-size: 16px; cursor: pointer; }
.progress-container { width: 100%; height: 20px; background-color: #ddd; border-radius: 10px; overflow: hidden; margin-bottom: 5px; }
.progress-bar { height: 100%; width: 0%; background-color: #4CAF50; }
.progress-text { text-align: right; font-size: 14px; margin-bottom: 10px; }
#bottom-tabs { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; border-top: 1px solid #ccc; background: white; }
.bottom-tab { flex: 1; text-align: center; padding: 12px 0; cursor: pointer; border-right: 1px solid #ccc; }
.bottom-tab:last-child { border-right: none; }
.bottom-tab.active { background-color: #4CAF50; color: white; }
body { padding-bottom: 60px; }
</style>
</head>

<body>

<div id="progress-page">
<div class="tabs">
<div class="tab active">111回</div>
<div class="tab">110回</div>
<div class="tab">109回</div>
<div class="tab">108回</div>
<div class="tab">107回</div>
<div class="tab">106回</div>
<div class="tab">105回</div>
<div class="tab">104回</div>
</div>

<div class="progress-container">
<div class="progress-bar" id="yearProgressBar"></div>
</div>
<p class="progress-text" id="yearProgressText"></p>

<div class="genre-tabs">
<div class="genre-tab active" data-genre="hisshu">必須問題</div>
<div class="genre-tab" data-genre="riron">理論問題</div>
<div class="genre-tab" data-genre="jissen">実践問題</div>
</div>

<div class="progress-container">
<div class="progress-bar" id="genreProgressBar"></div>
</div>
<p class="progress-text" id="genreProgressText"></p>

<div id="grid-container">
<div class="grid" id="hisshu"></div>
<div class="grid" id="riron" style="display:none"></div>
<div class="grid" id="jissen" style="display:none"></div>
</div>

</div>

<div id="bottom-tabs">
<div class="bottom-tab active" data-page="progress">過去問進捗</div>
<div class="bottom-tab" data-page="weekly">今週の成果</div>
</div>

<div id="weekly-page" style="display:none; padding:15px;">
<h2>今週の成果🌈</h2>
<canvas id="weeklyChart" height="200"></canvas>

<button id="shareBtn"
style="
margin-top:15px;
padding:12px;
width:100%;
background-color:#4CAF50;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;">
友達に共有する
</button>

</div>

<!-- Chart.js 先に読み込む -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let lastTouch = 0;
document.addEventListener('touchend', function(e){
const now = Date.now();
if(now - lastTouch <= 300) e.preventDefault();
lastTouch = now;
}, { passive: false });

const tabs = document.querySelectorAll(".tab");
const genreTabs = document.querySelectorAll(".genre-tab");
const grids = document.querySelectorAll(".grid");

let currentYear = "111";
const genreRanges = { hisshu:[1,90], riron:[91,195], jissen:[196,345] };

tabs.forEach(tab=>{
tab.addEventListener("click",function(){
tabs.forEach(t=>t.classList.remove("active"));
this.classList.add("active");
currentYear=this.textContent.replace("回","");
loadYear(currentYear);
updateYearProgress(currentYear);
updateGenreProgress(currentYear,document.querySelector(".genre-tab.active").dataset.genre);
});
});

genreTabs.forEach(tab=>{
tab.addEventListener("click",()=>{
genreTabs.forEach(t=>t.classList.remove("active"));
tab.classList.add("active");
const genre=tab.dataset.genre;
grids.forEach(g=>g.style.display=(g.id===genre)?"grid":"none");
updateGenreProgress(currentYear,genre);
});
});

function loadYear(year){
["hisshu","riron","jissen"].forEach(genre=>{
const grid=document.getElementById(genre);
grid.innerHTML="";
const storageKey="kokushi_"+year+"_"+genre;
let savedData=JSON.parse(localStorage.getItem(storageKey))||[];
const [start,end]=genreRanges[genre];

for(let i=start;i<=end;i++){
const cell=document.createElement("div");
cell.classList.add("cell");
cell.textContent=i;

let count=savedData[i]?.count||0;
let starred=savedData[i]?.starred||false;

const starBtn=document.createElement("div");
starBtn.classList.add("star-btn");
starBtn.textContent=starred?"⭐":"☆";

starBtn.addEventListener("click",e=>{
e.stopPropagation();
starred=!starred;
starBtn.textContent=starred?"⭐":"☆";
if(!savedData[i]) savedData[i]={count:0,starred:false,dates:[]};
savedData[i].starred=starred;
localStorage.setItem(storageKey,JSON.stringify(savedData));
updateYearProgress(currentYear);
updateGenreProgress(currentYear,genre);
});

cell.appendChild(starBtn);

const updateColor=()=>{
if(count===1) cell.style.backgroundColor="#c8e6c9";
else if(count===2) cell.style.backgroundColor="#81c784";
else if(count>=3) cell.style.backgroundColor="#388e3c";
else cell.style.backgroundColor="white";
};
updateColor();

cell.addEventListener("click",()=>{
count++;
if(count>3) count=0;

const now = new Date();
const today =
  now.getFullYear() + "-" +
  String(now.getMonth() + 1).padStart(2, "0") + "-" +
  String(now.getDate()).padStart(2, "0");

if(!savedData[i]) savedData[i]={count:0,starred:false,dates:[]};
if(!savedData[i].dates) savedData[i].dates=[];

if(count===0){
savedData[i].dates=[]; // ★白に戻したら履歴削除
}else{
savedData[i].dates.push(today);
}

savedData[i].count=count;
savedData[i].starred=starred;

localStorage.setItem(storageKey,JSON.stringify(savedData));
updateColor();
updateYearProgress(currentYear);
updateGenreProgress(currentYear,genre);
updateWeeklyChart();
});

grid.appendChild(cell);
}
});
}

function updateYearProgress(year){
let totalSolved=0;
["hisshu","riron","jissen"].forEach(g=>{
const data=JSON.parse(localStorage.getItem("kokushi_"+year+"_"+g))||[];
totalSolved+=data.filter(d=>d&&d.count>0).length;
});
const percent=Math.floor(totalSolved/345*100);
document.getElementById("yearProgressBar").style.width=percent+"%";
document.getElementById("yearProgressText").textContent=percent+"% 完了 ("+totalSolved+"/345)";
}

function updateGenreProgress(year,genre){
const data=JSON.parse(localStorage.getItem("kokushi_"+year+"_"+genre))||[];
const solvedCount=data.filter(d=>d&&d.count>0).length;
const [start,end]=genreRanges[genre];
const total=end-start+1;
const percent=Math.floor(solvedCount/total*100);
document.getElementById("genreProgressBar").style.width=percent+"%";
document.getElementById("genreProgressText").textContent=percent+"% 完了 ("+solvedCount+"/"+total+")";
}

loadYear(currentYear);
updateYearProgress(currentYear);
updateGenreProgress(currentYear,"hisshu");

const bottomTabs=document.querySelectorAll(".bottom-tab");
const mainContent=document.getElementById("progress-page");
const weeklyPage=document.getElementById("weekly-page");

bottomTabs.forEach(tab=>{
tab.addEventListener("click",()=>{
bottomTabs.forEach(t=>t.classList.remove("active"));
tab.classList.add("active");
if(tab.dataset.page==="progress"){
mainContent.style.display="block";
weeklyPage.style.display="none";
}else{
mainContent.style.display="none";
weeklyPage.style.display="block";
updateWeeklyChart();
}
});
});

let weeklyChart;

function getMonday(date){
const d=new Date(date);
const day=d.getDay();
const diff=(day===0?-6:1-day);
d.setDate(d.getDate()+diff);
d.setHours(0,0,0,0);
return d;
}

function updateWeeklyChart(){
const today=new Date();
const monday=getMonday(today);
const weekDates=[];
for(let i=0;i<7;i++){
const d=new Date(monday);
d.setDate(monday.getDate()+i);
  const dateStr =
    d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, "0") + "-" +
    String(d.getDate()).padStart(2, "0");

  weekDates.push(dateStr);
}

const counts=[0,0,0,0,0,0,0];

["hisshu","riron","jissen"].forEach(g=>{
const data=JSON.parse(localStorage.getItem("kokushi_"+currentYear+"_"+g))||[];
data.forEach(item=>{
if(item&&item.count>0&&item.dates){
item.dates.forEach(date=>{
const index=weekDates.indexOf(date);
if(index!==-1) counts[index]++;
});
}
});
});

const ctx=document.getElementById("weeklyChart").getContext("2d");
if(weeklyChart) weeklyChart.destroy();

weeklyChart=new Chart(ctx,{
type:"bar",
data:{
labels:["月","火","水","木","金","土","日"],
datasets:[{
data:counts,
backgroundColor:["red","yellow","orange","green","skyblue","blue","purple"]
}]
},
options:{
responsive:true,
plugins:{
  legend:{display:false}
},
scales:{
  x:{
    ticks:{
      font:{
        size:16   
      }
    }
  },
  y:{
    beginAtZero:true,
    ticks:{
      precision:0,
      font:{
        size:16   
      }
    }
  }
}
}
});
}

updateWeeklyChart();

const shareBtn = document.getElementById("shareBtn");

shareBtn.addEventListener("click", () => {
  const chartCanvas = document.getElementById("weeklyChart");

  // 新しいキャンバス作成
  const exportCanvas = document.createElement("canvas");
  const ctx = exportCanvas.getContext("2d");

const shareBtn = document.getElementById("shareBtn");

shareBtn.addEventListener("click", () => {
  const chartCanvas = document.getElementById("weeklyChart");

  const exportCanvas = document.createElement("canvas");
  const ctx = exportCanvas.getContext("2d");

  const padding = 80; // ← 余白
  const titleSpace = 140;
  const footerSpace = 80;

  const width = chartCanvas.width + padding * 2;
  const height = chartCanvas.height + padding * 2 + titleSpace;

  exportCanvas.width = width;
  exportCanvas.height = height;

  // 白背景
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, width, height);

  // 緑フレーム
  ctx.strokeStyle = "#4CAF50";
  ctx.lineWidth = 80; // 枠の太さ
  ctx.strokeRect(0, 0, width, height);

  // タイトル（黒・大きく）
  ctx.fillStyle = "black";
  ctx.font = "bold 40px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("今週の成果🌈", width / 2, 80);

  // 少し小さく描画（スケール）
  const scale = 0.85;
  const chartWidth = chartCanvas.width * scale;
  const chartHeight = chartCanvas.height * scale;

  const x = (width - chartWidth) / 2;
  const y = titleSpace + 120;

  ctx.drawImage(chartCanvas, x, y, chartWidth, chartHeight);

  // フッター文字（小さめ・グレー）
  ctx.fillStyle = "#999999";
  ctx.font = "16px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("Study Progress", width / 2, height - 30);

  const imageURL = exportCanvas.toDataURL("image/png");

  const link = document.createElement("a");
  link.href = imageURL;
  link.download = "weekly_progress.png";
  link.click();
});

  exportCanvas.width = width;
  exportCanvas.height = height;

  // 白背景
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, width, height);

  // タイトル描画
  ctx.fillStyle = "#4CAF50";
  ctx.font = "bold 28px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("今週の成果🌈", width / 2, 50);

  // グラフ描画
  ctx.drawImage(chartCanvas, 0, 100);

  // PNG化
  const imageURL = exportCanvas.toDataURL("image/png");

  const link = document.createElement("a");
  link.href = imageURL;
  link.download = "weekly_progress.png";
  link.click();
});

</script>
</body>
</html>
